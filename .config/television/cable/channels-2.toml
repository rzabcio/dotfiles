[metadata]
name = "channels"
description = "A collection of channels for television"

[source]
command = "tv list-channels"
output = "$env.HOME/television/{}"

[keybindings]
enter = "actions:zap"

[actions.zap]
description = "Switch to the selected channel"
command = "tv '{}'"
mode = "execute"

[preview]
command = "bat -n --color=always ~/.config/television/cable/'{}'.toml"
